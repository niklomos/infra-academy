  <text x="110" y="354" fill="#0F172A" font-family="IBM Plex Sans Thai, sans-serif" font-size="30" font-weight="700">Compute Core</text>
  <text x="110" y="392" fill="#475569" font-family="IBM Plex Sans Thai, sans-serif" font-size="22">CPU, GPU, Mainboard, RAM</text>
  <text x="110" y="428" fill="#64748B" font-family="IBM Plex Sans Thai, sans-serif" font-size="20">ตอบคำถามว่าเครื่องนี้แรงพอไหม</text>

  <text x="470" y="354" fill="#0F172A" font-family="IBM Plex Sans Thai, sans-serif" font-size="30" font-weight="700">Device Type</text>
  <text x="470" y="392" fill="#475569" font-family="IBM Plex Sans Thai, sans-serif" font-size="22">Desktop, Mini PC, Notebook, WS</text>
  <text x="470" y="428" fill="#64748B" font-family="IBM Plex Sans Thai, sans-serif" font-size="20">ตอบโจทย์การใช้งานและงบประมาณ</text>

  <text x="830" y="354" fill="#0F172A" font-family="IBM Plex Sans Thai, sans-serif" font-size="30" font-weight="700">Data Layer</text>
  <text x="830" y="392" fill="#475569" font-family="IBM Plex Sans Thai, sans-serif" font-size="22">NVMe, SSD, HDD, NAS, SAN</text>
  <text x="830" y="428" fill="#64748B" font-family="IBM Plex Sans Thai, sans-serif" font-size="20">ตอบคำถามว่าเร็วแค่ไหนและเก็บได้นานไหม</text>

  <text x="1190" y="354" fill="#0F172A" font-family="IBM Plex Sans Thai, sans-serif" font-size="30" font-weight="700">Power & Cooling</text>
  <text x="1190" y="392" fill="#475569" font-family="IBM Plex Sans Thai, sans-serif" font-size="22">PSU, UPS, Thermal Design</text>
  <text x="1190" y="428" fill="#64748B" font-family="IBM Plex Sans Thai, sans-serif" font-size="20">ทำให้ระบบเสถียร ใช้งานได้จริง</text>

  <path d="M410 338H450" stroke="#B8C8F6" stroke-width="6" stroke-linecap="round"/>
  <path d="M770 338H810" stroke="#CDBCF7" stroke-width="6" stroke-linecap="round"/>
  <path d="M1130 338H1170" stroke="#B7E8D2" stroke-width="6" stroke-linecap="round"/>

  <rect x="90" y="510" width="1400" height="200" rx="24" fill="#0F172A"/>
  <text x="126" y="566" fill="#FFFFFF" font-family="IBM Plex Sans Thai, sans-serif" font-size="28" font-weight="700">วิธีคุยแบบง่ายเหมือน web app ชั้นนำ</text>
  <text x="126" y="608" fill="#CBD5E1" font-family="IBM Plex Sans Thai, sans-serif" font-size="22">1) ถาม workload  2) map ไปที่ platform  3) สรุปเป็นภาษาธุรกิจ  4) เสริมเหตุผลทางเทคนิค</text>

  <rect x="124" y="636" width="302" height="42" rx="18" fill="#1A6EFF"/>
  <rect x="450" y="636" width="302" height="42" rx="18" fill="#7B61FF"/>
  <rect x="776" y="636" width="302" height="42" rx="18" fill="#0FA66B"/>
  <rect x="1102" y="636" width="302" height="42" rx="18" fill="#F08C00"/>
  <text x="148" y="664" fill="#FFFFFF" font-family="IBM Plex Sans Thai, sans-serif" font-size="20" font-weight="600">Office / ERP / Browser → CPU + RAM ก่อน</text>
  <text x="474" y="664" fill="#FFFFFF" font-family="IBM Plex Sans Thai, sans-serif" font-size="20" font-weight="600">Creator / CAD → GPU + ECC + Display</text>
  <text x="800" y="664" fill="#FFFFFF" font-family="IBM Plex Sans Thai, sans-serif" font-size="20" font-weight="600">AI / Data → VRAM + Storage + Cooling</text>
  <text x="1126" y="664" fill="#FFFFFF" font-family="IBM Plex Sans Thai, sans-serif" font-size="20" font-weight="600">SMB Infra → UPS + NAS + Reliability</text>
</svg>
